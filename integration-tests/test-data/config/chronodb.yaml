# ChronoDB 配置文件
# 完整配置示例

# ============================================
# 服务器基础配置
# ============================================
listen_address: "0.0.0.0"
port: 9090
data_dir: "/var/lib/chronodb"

# ============================================
# 存储配置
# ============================================
storage:
  # 存储模式: standalone | distributed
  mode: standalone
  
  # 存储后端: local | s3 | gcs
  backend: local
  
  # 本地存储路径
  local_path: "/var/lib/chronodb/data"
  
  # 最大磁盘使用率
  max_disk_usage: "80%"

# ============================================
# 查询配置
# ============================================
query:
  # 最大并发查询数
  max_concurrent: 100
  
  # 查询超时（秒）
  timeout: 120
  
  # 最大返回样本数
  max_samples: 50000000
  
  # 启用向量化执行
  enable_vectorized: true
  
  # 启用查询并行化
  enable_parallel: true
  
  # 启用自动降采样
  enable_auto_downsampling: true
  
  # 降采样精度选择策略: auto | conservative | aggressive
  downsample_policy: "auto"
  
  # 查询缓存大小
  query_cache_size: "2GB"
  
  # 启用查询结果缓存
  enable_query_cache: true
  
  # 查询缓存TTL（秒）
  query_cache_ttl: 300

# ============================================
# 规则配置
# ============================================
rules:
  # 规则文件路径
  rule_files: []
  
  # 规则评估间隔（秒）
  evaluation_interval: 60
  
  # 告警发送间隔（秒）
  alert_send_interval: 60

# ============================================
# 目标配置
# ============================================
targets:
  # 目标配置文件路径
  config_file: ~
  
  # 抓取间隔（秒）
  scrape_interval: 60
  
  # 抓取超时（秒）
  scrape_timeout: 10

# ============================================
# 内存配置
# ============================================
memory:
  # MemStore 大小
  memstore_size: "4GB"
  
  # WAL 大小
  wal_size: "1GB"
  
  # 查询缓存大小
  query_cache_size: "2GB"
  
  # 最大内存使用率
  max_memory_usage: "80%"

# ============================================
# 压缩配置
# ============================================
compression:
  # 时间列压缩
  time_column:
    # 压缩算法
    algorithm: "zstd"
    # 压缩级别
    level: 3
  
  # 值列压缩
  value_column:
    # 压缩算法
    algorithm: "zstd"
    # 压缩级别
    level: 3
    # 使用预测编码
    use_prediction: true
  
  # 标签列压缩
  label_column:
    # 压缩算法
    algorithm: "dictionary"
    # 压缩级别
    level: 0

# ============================================
# 日志配置
# ============================================
log:
  # 日志级别
  level: "info"
  # 日志格式: json | text
  format: "json"
  # 日志输出路径
  output: "/var/log/chronodb/chronodb.log"

# ============================================
# 预聚合配置
# ============================================
pre_aggregation:
  # 自动创建配置
  auto_create:
    # 是否启用自动创建
    enabled: true
    # 查询频率阈值（次/小时）
    frequency_threshold: 20
    # 统计时间窗口（小时）
    time_window: 24
    # 最大自动创建规则数
    max_auto_rules: 100
    # 排除的查询模式（正则表达式）
    exclude_patterns:
      - "^up$"
      - "^ALERTS$"
  
  # 自动清理配置
  auto_cleanup:
    # 是否启用自动清理
    enabled: true
    # 清理检查间隔（小时）
    check_interval: 6
    # 低频阈值（次/小时）
    low_frequency_threshold: 5
    # 清理前的观察期（小时）
    observation_period: 48
  
  # 存储配置
  storage:
    # 预聚合数据保留时间（天）
    retention_days: 30
    # 最大存储空间（GB）
    max_storage_gb: 100
    # 压缩算法
    compression: "zstd"
