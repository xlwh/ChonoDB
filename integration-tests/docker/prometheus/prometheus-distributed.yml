global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'prometheus-distributed-test'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus-dist-test'

  - job_name: 'chronodb-nodes'
    static_configs:
      - targets:
          - 'chronodb-node-1:9090'
          - 'chronodb-node-2:9090'
          - 'chronodb-node-3:9090'
        labels:
          cluster: 'chronodb-distributed'
