version: '3.8'

services:
  etcd-1:
    image: bitnami/etcd:3.5
    container_name: etcd-1
    environment:
      - ETCD_NAME=etcd-1
      - ETCD_INITIAL_CLUSTER=etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster
      - ALLOW_NONE_AUTHENTICATION=yes
    ports:
      - "2379:2379"
    networks:
      - test-network

  etcd-2:
    image: bitnami/etcd:3.5
    container_name: etcd-2
    environment:
      - ETCD_NAME=etcd-2
      - ETCD_INITIAL_CLUSTER=etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster
      - ALLOW_NONE_AUTHENTICATION=yes
    networks:
      - test-network

  etcd-3:
    image: bitnami/etcd:3.5
    container_name: etcd-3
    environment:
      - ETCD_NAME=etcd-3
      - ETCD_INITIAL_CLUSTER=etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster
      - ALLOW_NONE_AUTHENTICATION=yes
    networks:
      - test-network

  chronodb-node-1:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: chronodb-node-1
    ports:
      - "9091:9090"
      - "9092:9091"
    environment:
      - RUST_LOG=debug
      - CHRONODB_NODE_ID=1
      - CHRONODB_ETCD_ENDPOINTS=etcd-1:2379,etcd-2:2379,etcd-3:2379
    volumes:
      - chronodb-data-1:/var/lib/chronodb
      - ./chronodb/chronodb-distributed.yaml:/etc/chronodb/chronodb.yaml:ro
    depends_on:
      - etcd-1
      - etcd-2
      - etcd-3
    networks:
      - test-network

  chronodb-node-1-agent:
    build:
      context: /Users/zhb/workspace/prom-agent
      dockerfile: Dockerfile
    container_name: chronodb-node-1-agent
    depends_on:
      - chronodb-node-1
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - ./agent/chronodb-node-1-agent.yaml:/etc/prom-agent/agent_config.yaml:ro
    environment:
      - NODE_NAME=chronodb-node-1
      - SERVICE_PORT=9090
    networks:
      - test-network

  chronodb-node-2:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: chronodb-node-2
    ports:
      - "9093:9090"
      - "9094:9091"
    environment:
      - RUST_LOG=debug
      - CHRONODB_NODE_ID=2
      - CHRONODB_ETCD_ENDPOINTS=etcd-1:2379,etcd-2:2379,etcd-3:2379
    volumes:
      - chronodb-data-2:/var/lib/chronodb
      - ./chronodb/chronodb-distributed.yaml:/etc/chronodb/chronodb.yaml:ro
    depends_on:
      - etcd-1
      - etcd-2
      - etcd-3
    networks:
      - test-network

  chronodb-node-2-agent:
    build:
      context: /Users/zhb/workspace/prom-agent
      dockerfile: Dockerfile
    container_name: chronodb-node-2-agent
    depends_on:
      - chronodb-node-2
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - ./agent/chronodb-node-2-agent.yaml:/etc/prom-agent/agent_config.yaml:ro
    environment:
      - NODE_NAME=chronodb-node-2
      - SERVICE_PORT=9090
    networks:
      - test-network

  chronodb-node-3:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: chronodb-node-3
    ports:
      - "9095:9090"
      - "9096:9091"
    environment:
      - RUST_LOG=debug
      - CHRONODB_NODE_ID=3
      - CHRONODB_ETCD_ENDPOINTS=etcd-1:2379,etcd-2:2379,etcd-3:2379
    volumes:
      - chronodb-data-3:/var/lib/chronodb
      - ./chronodb/chronodb-distributed.yaml:/etc/chronodb/chronodb.yaml:ro
    depends_on:
      - etcd-1
      - etcd-2
      - etcd-3
    networks:
      - test-network

  chronodb-node-3-agent:
    build:
      context: /Users/zhb/workspace/prom-agent
      dockerfile: Dockerfile
    container_name: chronodb-node-3-agent
    depends_on:
      - chronodb-node-3
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - ./agent/chronodb-node-3-agent.yaml:/etc/prom-agent/agent_config.yaml:ro
    environment:
      - NODE_NAME=chronodb-node-3
      - SERVICE_PORT=9090
    networks:
      - test-network

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus-dist-test
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus-distributed.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - test-network

  prometheus-agent:
    build:
      context: /Users/zhb/workspace/prom-agent
      dockerfile: Dockerfile
    container_name: prometheus-dist-agent
    depends_on:
      - prometheus
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - ./agent/prometheus-agent.yaml:/etc/prom-agent/agent_config.yaml:ro
    environment:
      - NODE_NAME=prometheus
      - SERVICE_PORT=9090
    networks:
      - test-network

  monitoring-prometheus:
    image: prom/prometheus:v2.45.0
    container_name: monitoring-prometheus-dist
    ports:
      - "9097:9090"
    volumes:
      - ./prometheus/monitoring-prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - monitoring-prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-remote-write-receiver'
      - '--web.enable-lifecycle'
    networks:
      - test-network

volumes:
  chronodb-data-1:
  chronodb-data-2:
  chronodb-data-3:
  prometheus-data:
  monitoring-prometheus-data:

networks:
  test-network:
    driver: bridge
