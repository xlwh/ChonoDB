apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chronodb
  namespace: chronodb
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - chronodb.example.com
    secretName: chronodb-tls
  rules:
  - host: chronodb.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: chronodb
            port:
              number: 9090
