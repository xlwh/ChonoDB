apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chronodb
  namespace: chronodb
  labels:
    app: chronodb
spec:
  serviceName: chronodb
  replicas: 1
  selector:
    matchLabels:
      app: chronodb
  template:
    metadata:
      labels:
        app: chronodb
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: chronodb
        image: chronodb/chronodb:latest
        imagePullPolicy: IfNotPresent
        args:
        - --config.file=/etc/chronodb/chronodb.yaml
        ports:
        - containerPort: 9090
          name: http
          protocol: TCP
        - containerPort: 9091
          name: remote-write
          protocol: TCP
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        volumeMounts:
        - name: data
          mountPath: /var/lib/chronodb
        - name: config
          mountPath: /etc/chronodb
        - name: rules
          mountPath: /etc/chronodb/rules
        - name: targets
          mountPath: /etc/chronodb/targets
        - name: logs
          mountPath: /var/log/chronodb
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        env:
        - name: RUST_LOG
          value: "info"
        - name: RUST_BACKTRACE
          value: "1"
        - name: CHRONODB_DATA_DIR
          value: "/var/lib/chronodb"
        - name: CHRONODB_LOG_DIR
          value: "/var/log/chronodb"
        - name: CHRONODB_CONFIG_FILE
          value: "/etc/chronodb/chronodb.yaml"
      volumes:
      - name: config
        configMap:
          name: chronodb-config
      - name: rules
        configMap:
          name: chronodb-rules
      - name: targets
        configMap:
          name: chronodb-targets
      - name: logs
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 100Gi
      storageClassName: standard
