apiVersion: v1
kind: Service
metadata:
  name: chronodb
  namespace: chronodb
  labels:
    app: chronodb
spec:
  type: ClusterIP
  ports:
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: http
  selector:
    app: chronodb

---
apiVersion: v1
kind: Service
metadata:
  name: chronodb-headless
  namespace: chronodb
  labels:
    app: chronodb
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: http
  selector:
    app: chronodb
