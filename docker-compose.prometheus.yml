version: '3.8'

services:
  chronodb:
    build: .
    ports:
      - "9090:9090"
    volumes:
      - ./data/chronodb:/var/lib/chronodb
    environment:
      - RUST_LOG=info
    command: ./target/debug/chronodb-server

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus:/prometheus
    depends_on:
      - chronodb

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
