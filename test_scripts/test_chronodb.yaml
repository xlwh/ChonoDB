# ChronoDB 测试配置文件
listen_address: "0.0.0.0"
port: 9090
data_dir: "/Users/zhb/chronodb_test_data"

storage:
  mode: standalone
  backend: local
  local_path: "/Users/zhb/chronodb_test_data/data"
  max_disk_usage: "80%"

query:
  max_concurrent: 100
  timeout: 120
  max_samples: 50000000
  enable_vectorized: true
  enable_parallel: true
  enable_auto_downsampling: true
  downsample_policy: "auto"
  query_cache_size: "2GB"
  enable_query_cache: true
  query_cache_ttl: 300

rules:
  rule_files: []
  evaluation_interval: 60
  alert_send_interval: 60

targets:
  config_file: ~
  scrape_interval: 60
  scrape_timeout: 10

memory:
  memstore_size: "4GB"
  wal_size: "1GB"
  query_cache_size: "2GB"
  max_memory_usage: "80%"

compression:
  time_column:
    algorithm: "zstd"
    level: 3
  value_column:
    algorithm: "zstd"
    level: 3
    use_prediction: true
  label_column:
    algorithm: "dictionary"
    level: 0

log:
  level: "info"
  format: "json"
  output: ~

pre_aggregation:
  auto_create:
    enabled: true
    frequency_threshold: 20
    time_window: 24
    max_auto_rules: 100
    exclude_patterns:
      - "^up$"
      - "^ALERTS$"
  auto_cleanup:
    enabled: true
    check_interval: 6
    low_frequency_threshold: 5
    observation_period: 48
  storage:
    retention_days: 30
    max_storage_gb: 100
    compression: "zstd"
