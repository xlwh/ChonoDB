version: '3.8'

services:
  chronodb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chronodb
    ports:
      - "9090:9090"
      - "9091:9091"  # 远程写入端口
    volumes:
      - chronodb-data:/var/lib/chronodb
      - chronodb-logs:/var/log/chronodb
      - ./config/chronodb.yaml:/etc/chronodb/chronodb.yaml:ro
      - ./config/rules:/etc/chronodb/rules:ro
      - ./config/targets:/etc/chronodb/targets:ro
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
      - CHRONODB_DATA_DIR=/var/lib/chronodb
      - CHRONODB_LOG_DIR=/var/log/chronodb
      - CHRONODB_CONFIG_FILE=/etc/chronodb/chronodb.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - chronodb-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: '4G'
        reservations:
          cpus: '0.5'
          memory: '512M'

  # Prometheus（用于监控）
  prometheus:
    image: prom/prometheus:latest
    container_name: chronodb-prometheus
    ports:
      - "9092:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - chronodb-network
    profiles:
      - with-monitoring

  # MinIO 对象存储（可选）
  minio:
    image: minio/minio:latest
    container_name: chronodb-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - chronodb-network
    profiles:
      - with-minio

  # Grafana（可选，用于可视化）
  grafana:
    image: grafana/grafana:latest
    container_name: chronodb-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel
      - GF_PROMETHEUS_DEFAULT_DS_URL=http://prometheus:9090
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    networks:
      - chronodb-network
    profiles:
      - with-grafana

  # Alertmanager（可选，用于告警）
  alertmanager:
    image: prom/alertmanager:latest
    container_name: chronodb-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - chronodb-network
    profiles:
      - with-monitoring

  # Etcd（可选，用于分布式模式）
  etcd:
    image: bitnami/etcd:latest
    container_name: chronodb-etcd
    ports:
      - "2379:2379"
      - "2380:2380"
    environment:
      - ETCD_ROOT_PASSWORD=etcdroot
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
    volumes:
      - etcd-data:/bitnami/etcd
    restart: unless-stopped
    networks:
      - chronodb-network
    profiles:
      - with-etcd

volumes:
  chronodb-data:
    driver: local
  chronodb-logs:
    driver: local
  prometheus-data:
    driver: local
  minio-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local
  etcd-data:
    driver: local

networks:
  chronodb-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
