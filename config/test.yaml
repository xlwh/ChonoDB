listen_address: "0.0.0.0"
port: 9093
data_dir: "./test_data"

storage:
  mode: "standalone"
  backend: "local"
  local_path: "./test_data"
  max_disk_usage: "80%"

query:
  max_concurrent: 100
  timeout: 120
  max_samples: 50000000
  enable_vectorized: true
  enable_parallel: true
  enable_auto_downsampling: true
  downsample_policy: "auto"
  query_cache_size: "512MB"
  enable_query_cache: true
  query_cache_ttl: 300

rules:
  rule_files: []
  evaluation_interval: 60
  alert_send_interval: 60

targets:
  config_file: null
  scrape_interval: 60
  scrape_timeout: 10

memory:
  memstore_size: "2GB"
  wal_size: "256MB"
  query_cache_size: "512MB"
  max_memory_usage: "85%"

compression:
  time_column:
    algorithm: "zstd"
    level: 1
  value_column:
    algorithm: "zstd"
    level: 1
    use_prediction: false
  label_column:
    algorithm: "dictionary"
    level: 1

log:
  level: "info"
  format: "text"
  output: ""
