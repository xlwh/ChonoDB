# ChronoDB 配置文件
# 完整配置示例

# ============================================
# 服务器基础配置
# ============================================
listen_address: "0.0.0.0"
port: 9090
data_dir: "/var/lib/chronodb"

# ============================================
# 存储配置
# ============================================
storage:
  # 存储模式: standalone | distributed
  mode: standalone
  
  # 存储后端: local | s3 | gcs | minio
  backend: local
  
  # 本地存储配置
  local:
    path: "/var/lib/chronodb/data"
    max_disk_usage: "80%"
  
  # S3 配置（当 backend 为 s3 时使用）
  s3:
    bucket: "chronodb-timeseries"
    region: "us-east-1"
    # access_key: "your-access-key"
    # secret_key: "your-secret-key"
    # endpoint: "https://s3.amazonaws.com"
  
  # GCS 配置（当 backend 为 gcs 时使用）
  gcs:
    bucket: "chronodb-timeseries"
    region: "us-central1"
    # credentials_path: "/path/to/service-account.json"
    # project_id: "your-project-id"

# ============================================
# 查询配置
# ============================================
query:
  # 最大并发查询数
  max_concurrent: 100
  
  # 查询超时（秒）
  timeout: 120
  
  # 最大返回样本数
  max_samples: 50000000
  
  # 启用向量化执行
  enable_vectorized: true
  
  # 启用查询并行化
  enable_parallel: true
  
  # 启用自动降采样
  enable_auto_downsampling: true
  
  # 降采样精度选择策略: auto | conservative | aggressive
  downsample_policy: "auto"

# ============================================
# 降采样配置
# ============================================
downsampling:
  # 是否启用自动降采样
  enabled: true
  
  # 降采样层级配置
  levels:
    - level: L0
      resolution: "10s"
      retention: "168h"  # 7天
      
    - level: L1
      resolution: "1m"
      retention: "720h"  # 30天
      functions: ["min", "max", "avg", "sum", "count", "last"]
      
    - level: L2
      resolution: "5m"
      retention: "2160h"  # 90天
      functions: ["min", "max", "avg", "sum", "count", "last"]
      
    - level: L3
      resolution: "1h"
      retention: "8760h"  # 1年
      functions: ["min", "max", "avg", "sum", "count", "last"]
      
    - level: L4
      resolution: "1d"
      retention: "87600h"  # 10年
      functions: ["min", "max", "avg", "sum", "count", "last"]
  
  # 降采样任务配置
  task:
    # 降采样任务执行间隔
    interval: "15m"
    # 并发数
    concurrency: 4
    # 超时时间
    timeout: "1h"

# ============================================
# 内存配置
# ============================================
memory:
  # MemStore 大小
  memstore_size: "4GB"
  # WAL 大小
  wal_size: "1GB"
  # 查询缓存大小
  query_cache_size: "2GB"

# ============================================
# 压缩配置
# ============================================
compression:
  # 时间列压缩
  time_column:
    algorithm: "zstd"
    level: 3
  
  # 值列压缩
  value_column:
    algorithm: "zstd"
    level: 3
    use_prediction: true
  
  # 标签列压缩
  label_column:
    algorithm: "dictionary"

# ============================================
# 数据保留策略
# ============================================
retention:
  # 热数据保留时间
  hot: "24h"
  # 温数据保留时间
  warm: "168h"  # 7d
  # 冷数据保留时间
  cold: "720h"   # 30d
  # 归档数据保留时间
  archive: "8760h" # 1y

# ============================================
# 规则配置
# ============================================
rules:
  # 规则文件路径
  rule_files:
    - "/etc/chronodb/rules/*.yml"
  
  # 规则评估间隔（秒）
  evaluation_interval: 60
  
  # 告警发送间隔（秒）
  alert_send_interval: 60

# ============================================
# 目标配置
# ============================================
targets:
  # 目标配置文件路径
  config_file: "/etc/chronodb/targets.yml"
  
  # 抓取间隔（秒）
  scrape_interval: 60
  
  # 抓取超时（秒）
  scrape_timeout: 10

# ============================================
# 远程写入配置
# ============================================
remote_write:
  # 是否启用远程写入接收
  enabled: true
  
  # 监听地址
  listen_address: "0.0.0.0:9091"
  
  # 最大并发写入
  max_concurrent: 100
  
  # 批处理大小
  batch_size: 1000
  
  # 超时时间（秒）
  timeout: 30

# ============================================
# 分布式配置（当 mode 为 distributed 时使用）
# ============================================
distributed:
  # 节点 ID
  node_id: "node-1"
  
  # 元数据存储地址
  metastore_endpoints:
    - "etcd:2379"
  
  # 副本因子
  replication_factor: 3
  
  # 分片数量
  shard_count: 128
  
  # 集群节点
  nodes:
    - id: "node-1"
      address: "10.0.1.1:8080"
      rack: "rack-a"
      zone: "zone-1"

# ============================================
# 日志配置
# ============================================
log:
  # 日志级别: trace | debug | info | warn | error
  level: "info"
  
  # 日志格式: json | text
  format: "json"
  
  # 日志输出路径（为空则输出到 stdout）
  output: "/var/log/chronodb/chronodb.log"
