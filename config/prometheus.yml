# Prometheus 配置文件

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  # 监控 ChronoDB 实例
  - job_name: 'chronodb'
    static_configs:
      - targets: ['chronodb:9090']
    metrics_path: '/metrics'

  # 监控 Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 监控 Grafana
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  # 监控 Alertmanager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
