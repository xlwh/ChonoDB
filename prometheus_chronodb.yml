global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9091"]

remote_write:
  - url: "http://localhost:9090/api/v1/write"
    name: "chronodb"
    queue_config:
      max_samples_per_send: 1000
      max_shards: 200
      capacity: 2500

remote_read:
  - url: "http://localhost:9090/api/v1/read"
    name: "chronodb"
