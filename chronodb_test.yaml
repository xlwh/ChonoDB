listen_address: "0.0.0.0"
port: 9091
data_dir: "./chronodb_data"

storage:
  mode: standalone
  backend: local
  local:
    path: "./chronodb_data"
    max_disk_usage: "80%"

query:
  max_concurrent: 100
  timeout: 120
  max_samples: 50000000
  enable_vectorized: true
  enable_parallel: true

memory:
  memstore_size: "1GB"
  wal_size: "256MB"

log:
  level: "info"
  format: "text"
  output: ""
